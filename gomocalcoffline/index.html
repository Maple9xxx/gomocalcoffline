		};

		function patchComponent(c) {
			var opts = c.$options && c.$options.computed;
			if (!opts || !opts.languageOptions) return;
			opts.languageOptions = function() { return NEW_LANGS; };
			var w = c._computedWatchers && c._computedWatchers.languageOptions;
			if (w) {
				w.getter = function() { return NEW_LANGS; };
				w.value  = NEW_LANGS;
				w.dirty  = false;
			}
			try { c.$forceUpdate(); } catch(e) {}
		}

		function collectAll(root, arr) {
			arr = arr || [];
			arr.push(root);
			(root.$children || []).forEach(function(c) { collectAll(c, arr); });
			return arr;
		}

		function patchTitle() {
			var el = document.querySelector('.vux-header-title');
			if (el && el.textContent.trim() !== 'AI Caro') {
				el.textContent = 'AI Caro';
			}
		}

		function patch() {
			var appEl = document.getElementById('app');
			var vm = appEl && appEl.__vue__;
			if (!vm) return false;
			if (vm.$i18n && vm.$i18n.setLocaleMessage)
				vm.$i18n.setLocaleMessage('vi', VI);
			collectAll(vm).forEach(patchComponent);
			patchTitle();
			return true;
		}

		var timer = setInterval(function() {
			if (patch()) {
				clearInterval(timer);
				// Dùng MutationObserver để re-patch mỗi khi Vue render lại DOM
				var observer = new MutationObserver(function() {
					patch();
				});
				observer.observe(document.getElementById('app'), {
					childList: true,
					subtree: true
				});
			}
		}, 200);

		window.addEventListener('hashchange', function() {
			setTimeout(patch, 300);
		});
	})();
